name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.*"
      - "requirements.txt"
      - "inference.py"
      - "evaluate.py"
      - "evaluators/**"
      - "utils/**"
      - ".github/workflows/build-docker.yml"
  workflow_dispatch:
    inputs:
      layers:
        description: "Which layers to build"
        required: true
        default: "mmtu"
        type: choice
        options:
          - base
          - llada
          - mmtu
          - all

env:
  REGISTRY: docker.io
  DOCKERHUB_USER: achithanar
  BASE_IMAGE: docker.io/achithanar/mmtu-base:latest
  LLADA_IMAGE: docker.io/achithanar/mmtu-llada:latest
  RUNPOD_IMAGE: docker.io/achithanar/mmtu-runpod:latest

jobs:
  build-base:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.layers == 'base' || github.event.inputs.layers == 'all')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ${{ env.BASE_IMAGE }}
          cache-from: type=registry,ref=${{ env.BASE_IMAGE }}
          cache-to: type=inline

  build-llada:
    runs-on: ubuntu-latest
    needs: [build-base]
    if: >-
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.layers == 'llada' || github.event.inputs.layers == 'all') &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Checkout LLaDA fork
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/llada
          path: llada
          token: ${{ secrets.LLADA_REPO_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push LLaDA image
        uses: docker/build-push-action@v6
        with:
          context: ./llada
          file: Dockerfile.llada
          build-args: BASE_IMAGE=${{ env.BASE_IMAGE }}
          push: true
          tags: ${{ env.LLADA_IMAGE }}
          cache-from: type=registry,ref=${{ env.LLADA_IMAGE }}
          cache-to: type=inline

  build-mmtu:
    runs-on: ubuntu-latest
    needs: [build-llada]
    if: >-
      always() &&
      (needs.build-llada.result == 'success' || needs.build-llada.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push MMTU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mmtu
          build-args: BASE_IMAGE=${{ env.LLADA_IMAGE }}
          push: true
          tags: ${{ env.RUNPOD_IMAGE }}
          cache-from: type=registry,ref=${{ env.RUNPOD_IMAGE }}
          cache-to: type=inline
