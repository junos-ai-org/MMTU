experiment:
  name: smoke_sampling_fix
  seed: 42
  phase: smoke
  tags: [smoke, diffusion, 8b, random, semi-ar, dp, attn-mask-fix]

model:
  backend: llada-dp
  model_path: GSAI-ML/LLaDA-8B-Instruct
  alias: LLaDA-8B-Instruct
  dtype: bfloat16

inference:
  max_input_tokens: 3566  # 4096 - 530 (512 output + buffer)
  max_output_tokens: 512
  temperature: 0.0
  # LLaDA-specific
  tokens_per_step: 2      # unmask 2 tokens per step → steps = gen_length / 2
  block_length: 64        # semi-autoregressive block size
  remasking: random
  cfg_scale: 0.0
  batch_size: 64

dataset:
  name: MMTU-benchmark/MMTU
  split: train
  samples_per_task: 3     # 3 per task × 6 tasks = 18 total
  tasks:
    - Data-transform-reshape
    - Formula-prediction-context
    - semantic-transform
    - Arithmetic-Relationship
    - Functional-Dependency
    - String-Relationship
