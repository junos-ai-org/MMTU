experiment:
  name: encoder_vs_decoder_full_large
  purpose: "Full-large (500 sample) comparison of Qwen2.5-14B (decoder) vs T5Gemma-9B (enc-dec) on MMTU"
  tags: [full-large, 9b, encoder-decoder]
  wandb: true

data:
  artifact_path: artifacts/datasets/full_large_500_samples.jsonl

model:
  backend: t5gemma
  model_path: google/t5gemma-9b-9b-ul2-it
  alias: t5gemma-9b-9b-ul2-it
  dtype: bfloat16

inference:
  max_output_tokens: 512
  temperature: 0.0
  batch_size: 16
