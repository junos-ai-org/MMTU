experiment:
  name: encoder_vs_decoder_baseline_large
  purpose: "Large-scale baseline: Qwen2.5-14B (decoder) on 1005 MMTU samples"
  tags: [baseline, 14b, decoder-only, large]
  wandb: true

data:
  artifact_path: ../artifacts/dataset_large.jsonl

model:
  backend: qwen
  model_path: Qwen/Qwen2.5-14B-Instruct
  alias: Qwen2.5-14B-Instruct

inference:
  max_output_tokens: 512
  temperature: 0.0
  batch_size: 16
  vllm:
    base_url: http://localhost:8000/v1
    api_key: EMPTY
