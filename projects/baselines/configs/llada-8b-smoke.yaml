experiment:
  name: llada-8b-smoke
  seed: 42
  phase: smoke
  tags: [smoke, diffusion, 8b]

model:
  backend: llada
  model_path: GSAI-ML/LLaDA-8B-Instruct
  alias: LLaDA-8B-Instruct    # sanitized name for evaluate.py filename parsing
  dtype: bfloat16

inference:
  max_input_tokens: 3584
  max_output_tokens: 512
  temperature: 0.0
  # LLaDA-specific
  steps: 128
  block_length: 128
  remasking: low_confidence
  cfg_scale: 0.0

dataset:
  name: MMTU-benchmark/MMTU
  split: train
  tasks:
    - Entity-Matching
  samples_per_task: 5
